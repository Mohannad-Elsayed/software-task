<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reviews</title>

    <link rel="stylesheet" href="../../assets/css/main.css" />
    <link rel="stylesheet" href="../../assets/css/components.css" />
    <link rel="stylesheet" href="../../assets/css/Layout.css">

    <style>
        .page { max-width: 680px; margin: 40px auto; padding: 0 20px; }
        h1 { font-size: 22px; margin-bottom: 20px; color: var(--text); }

        .write-box {
            background: var(--white);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 24px;
        }

        .stars span {
            font-size: 26px;
            cursor: pointer;
            color: #ddd;
            transition: color 0.15s;
        }

        .write-box textarea {
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: none;
            height: 80px;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }

        .write-box button {
            margin-top: 10px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 9px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            float: right;
        }
        .write-box button:hover { background: var(--secondary); }

        .review-card {
            background: var(--white);
            border-radius: 10px;
            padding: 16px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 14px;
        }
        .review-card .top { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .review-card .name { font-weight: 700; font-size: 15px; }
        .review-card .date { font-size: 12px; color: var(--gray); }
        .review-card .stars-display { color: #f5c518; font-size: 14px; }
        .review-card p { font-size: 14px; color: #444; margin-top: 6px; line-height: 1.6; }
        .empty { text-align: center; color: var(--gray); padding: 40px; }
    </style>
</head>
<body>
    <div class="page">
        <h1>⭐ Reviews</h1>

        <div class="write-box">
            <div class="stars" id="stars">
                <span data-v="1">★</span>
                <span data-v="2">★</span>
                <span data-v="3">★</span>
                <span data-v="4">★</span>
                <span data-v="5">★</span>
            </div>
            <textarea id="reviewText" placeholder="Write your review..."></textarea>
            <button id="postBtn">Post</button>
            <div style="clear:both"></div>
        </div>

        <div id="feed"><p class="empty">Loading...</p></div>
    </div>

    <!-- api.js first, then page script -->
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/navbar.js"></script>
    <script src="../../assets/js/community.js"></script>
</body>
</html>
