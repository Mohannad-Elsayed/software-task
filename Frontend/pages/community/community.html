<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community</title>

    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/Layout.css">
   <style>
    /* Active sidebar link */
.sidebar .active {
    color: var(--primary);
}

/* Create Post */
.create-post {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.create-post textarea {
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    font-size: 14px;
}

.create-post button {
    margin-top: 10px;
    background: var(--primary);
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
}

/* Feed */
.feed {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* Post Card */
.post {
    background: white;
    border-radius: 14px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.06);
    overflow: hidden;
}

/* Header */
.post-header {
    display: flex;
    align-items: center;
    padding: 12px;
}

.avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #ddd;
    margin-right: 10px;
}

/* Content */
.post-content {
    padding: 0 12px 10px;
    font-size: 15px;
}

/* Actions */
.post-actions {
    display: flex;
    gap: 15px;
    padding: 10px 12px;
    font-size: 14px;
    border-top: 1px solid #eee;
}

.post-actions span {
    cursor: pointer;
}

/* Comments */
.comments {
    padding: 0 12px 10px;
}

.comment {
    font-size: 13px;
    margin-top: 5px;
}

/* Comment Input */
.comment-input {
    display: flex;
    border-top: 1px solid #eee;
}

.comment-input input {
    flex: 1;
    border: none;
    padding: 10px;
}

.comment-input button {
    border: none;
    background: none;
    color: var(--primary);
    padding: 10px;
    cursor: pointer;
}
/* Menu container */
.menu-container {
    margin-left: auto;
    position: relative;
}

/* 3 dots button */
.menu-btn {
    cursor: pointer;
    font-size: 20px;
    padding: 5px;
}

/* Dropdown menu */
.menu {
    position: absolute;
    right: 0;
    top: 25px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    display: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* Show menu */
.menu.show {
    display: block;
}

/* Button */
.menu button {
    background: none;
    border: none;
    padding: 10px 15px;
    cursor: pointer;
    width: 100%;
    text-align: left;
}

.menu button:hover {
    background: #f5f5f5;
}
   </style>
</head>

<body>
    <!-- ── Main Container ── -->
    <div class="container">
        <main class="content">

            <!-- Create Post -->
            <section class="create-post">
                <textarea id="postInput" placeholder="Share your eco activity..."></textarea>
                <button onclick="createPost()">Post</button>
            </section>

            <!-- Feed -->
            <section id="feed" class="feed"></section>

        </main>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/navbar.js"></script>
    <script src="../../assets/js/community.js"></script>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('visible');
        }

        function togglePages(id, btn) {
            const pages = document.getElementById(id);
            pages.classList.toggle('open');
            btn.classList.toggle('open');
        }
    </script>
    <!-- <script src="/assets/js/navbar.js"></script> -->
</body>
</html>
