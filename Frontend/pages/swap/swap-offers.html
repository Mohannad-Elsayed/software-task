<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swap Management | EcoSwap</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .dashboard-container { 
            max-width: 1000px; 
            margin: 40px auto; 
            padding: 0 20px; 
        }

        .header-section { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
        }
        
        .tabs { 
            display: flex; 
            gap: 30px; 
            border-bottom: 2px solid #e2e8f0; 
            margin-bottom: 25px; 
        }
        .tab { 
            padding: 12px 5px; 
            cursor: pointer; 
            font-weight: 600; 
            color: #64748b; 
            position: relative; 
            transition: 0.3s; 
        }
        .tab.active { 
            color: var(--primary); 
        }
        .tab.active::after { 
            content: ''; 
            position: absolute; 
            bottom: -2px; 
            left: 0; 
            width: 100%; 
            height: 2px; 
            background: var(--primary); 
        }

        .proposal-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 20px;
            transition: 0.2s;
        }
        .proposal-card:hover { 
            border-color: var(--primary); 
            transform: translateY(-3px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
        }

        .swap-deal { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
        }
        .deal-item { 
            text-align: center; 
        }
        .deal-item img {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            object-fit: cover;
            margin-bottom: 5px;
            border: 1px solid #f1f5f9;
        }
        .deal-item p { 
            margin: 0; 
            font-size: 13px; 
            font-weight: 600; 
            max-width: 120px; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
        }
        
        .swap-icon { 
            color: var(--primary); 
            font-size: 20px; 
        }

        .status-badge { 
            padding: 6px 12px; 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }
        .status-completed { background: #dcfce7; color: #166534; }
        .status-pending { background: #fffbeb; color: #92400e; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        .status-accepted { background: #e0f2fe; color: #075985; }

        .actions { 
            display: flex; 
            gap: 10px; 
        }
        .btn-approve { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 10px 18px; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .btn-deny { 
            background: #fee2e2; 
            color: #dc2626; 
            border: none; 
            padding: 10px 18px; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
        }
        .btn-approve:hover { 
            background: #089ba3; 
            box-shadow: 0 4px 10px rgba(9, 177, 186, 0.3); 
        }

        @media (max-width: 768px) {
            .proposal-card { grid-template-columns: 1fr; text-align: center; justify-items: center; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header-section">
            <h1>Swap Control Center</h1>
            <div id="pendingCount" style="font-size: 14px; color: #f59e0b; font-weight: 700;"></div>
        </div>

        <div class="tabs">
            <div id="incomingTab" class="tab active">Received Offers</div>
            <div id="outgoingTab" class="tab">Sent Requests</div>
        </div>

        <div id="proposalsList">
            <p style="text-align:center;padding:40px;color:#94a3b8;">Loading swap offers...</p>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/navbar.js"></script>
    <script src="../../assets/js/swaps.js"></script>
</body>
</html>
