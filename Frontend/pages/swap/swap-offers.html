<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swap Management | EcoSwap</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #09b1ba;
            --pending: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; }
        .dashboard-container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .tabs { display: flex; gap: 30px; border-bottom: 2px solid var(--border); margin-bottom: 25px; }
        .tab { padding: 12px 5px; cursor: pointer; font-weight: 600; color: #64748b; position: relative; transition: 0.3s; }
        .tab.active { color: var(--primary); }
        .tab.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 2px; background: var(--primary); }

        .offer-card {
            background: var(--white);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 20px;
            transition: 0.2s;
        }
        .offer-card:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        .swap-deal { display: flex; align-items: center; gap: 20px; }
        .deal-item { text-align: center; }
        .deal-item img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; border: 1px solid #f1f5f9; }
        .deal-item p { margin: 5px 0 0; font-size: 13px; font-weight: 600; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .exchange-icon { color: var(--primary); font-size: 20px; }

        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-completed { background: #dcfce7; color: #166534; }
        .status-pending { background: #fffbeb; color: #92400e; }
        .status-rejected { background: #fee2e2; color: #991b1b; }

        .action-group { display: flex; gap: 10px; }
        .btn-approve { background: var(--primary); color: white; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-deny { background: #fee2e2; color: #dc2626; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-approve:hover { background: #089ba3; box-shadow: 0 4px 10px rgba(9, 177, 186, 0.3); }

        @media (max-width: 768px) {
            .offer-card { grid-template-columns: 1fr; text-align: center; justify-items: center; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>Swap Control Center</h1>
            <div id="pendingCount" style="font-size: 14px; color: var(--pending); font-weight: 700;"></div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('incoming', this)">Received Offers</div>
            <div class="tab" onclick="switchTab('outgoing', this)">Sent Requests</div>
        </div>

        <div id="offersList">
            <p style="text-align:center;padding:40px;color:#94a3b8;">Loading swap offers...</p>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/navbar.js"></script>
    <script>
    const API_BASE = 'http://localhost:8000/Backend/index.php?route=/api';

    document.addEventListener("DOMContentLoaded", () => {
        const listContainer = document.getElementById('offersList');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        let currentTab = 'incoming';

        if (!user.user_id) {
            window.location.href = '../auth/login.html';
            return;
        }

        async function loadSwapOffers() {
            listContainer.innerHTML = '<p style="text-align:center;padding:40px;color:#94a3b8;">Loading swap offers...</p>';
            try {
                const response = await fetch(`${API_BASE}/swap-requests&user_id=${user.user_id}&type=${currentTab}`);
                const result = await response.json();
                const offers = result.data || [];

                if (offers.length === 0) {
                    listContainer.innerHTML = `
                        <div style="text-align:center; padding:50px; color:#64748b;">
                            <i class="ti ti-arrows-exchange" style="font-size:48px; opacity:0.2;"></i>
                            <p>No ${currentTab === 'incoming' ? 'received' : 'sent'} offers found.</p>
                        </div>`;
                    return;
                }

                if (currentTab === 'incoming') {
                    const pending = offers.filter(o => o.status === 'pending').length;
                    document.getElementById('pendingCount').innerHTML = pending > 0 ? `<i class="ti ti-leaf"></i> ${pending} New Offers` : '';
                }

                renderOffers(offers);
            } catch (err) {
                console.error("Failed to load swap offers:", err);
                listContainer.innerHTML = '<p style="text-align:center;padding:40px;color:#ef4444;">Failed to load swap offers.</p>';
            }
        }

        function renderOffers(offers) {
            listContainer.innerHTML = offers.map(offer => {
                const isPending = offer.status === 'pending';
                const statusClass = `status-${offer.status}`;
                
                return `
                    <div class="offer-card">
                        <div class="swap-deal">
                            <div class="deal-item">
                                <p style="font-size:10px; color:#94a3b8; text-transform:uppercase;">${currentTab === 'incoming' ? offer.initiator_name : 'Me'}</p>
                                <img src="https://via.placeholder.com/70" alt="Item">
                                <p title="${offer.offered_title}">${offer.offered_title || 'N/A'}</p>
                            </div>
                            
                            <div class="exchange-icon">
                                <i class="ti ti-arrows-exchange"></i>
                            </div>

                            <div class="deal-item">
                                <p style="font-size:10px; color:#94a3b8; text-transform:uppercase;">${currentTab === 'incoming' ? 'Me' : offer.partner_name}</p>
                                <img src="https://via.placeholder.com/70" alt="Item">
                                <p title="${offer.requested_title}">${offer.requested_title}</p>
                            </div>
                        </div>

                        <div style="text-align: right;">
                            <div style="margin-bottom: 15px;">
                                <span class="status-badge ${statusClass}">${offer.status}</span>
                            </div>
                            
                            ${currentTab === 'incoming' && isPending ? `
                                <div class="action-group">
                                    <button class="btn-deny" onclick="respondSwap(${offer.request_id}, 'reject')">Deny</button>
                                    <button class="btn-approve" onclick="respondSwap(${offer.request_id}, 'accept')">Approve</button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.switchTab = (tab, el) => {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            loadSwapOffers();
        };

        window.respondSwap = async (requestId, action) => {
            const confirm = await Swal.fire({
                title: action === 'accept' ? 'Approve Swap?' : 'Deny Swap?',
                text: action === 'accept' ? 'Ownership of items will be swapped immediately.' : 'This proposal will be removed.',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: action === 'accept' ? '#09b1ba' : '#ef4444',
                confirmButtonText: action === 'accept' ? 'Yes, Swap!' : 'Yes, Deny'
            });

            if (confirm.isConfirmed) {
                try {
                    const response = await fetch(`${API_BASE}/swap-requests/${requestId}/${action}`, {
                        method: 'POST'
                    });
                    const result = await response.json();
                    if (result.status === 'success') {
                        Swal.fire('Updated', result.message, 'success');
                        loadSwapOffers();
                    } else {
                        Swal.fire('Error', result.message || 'Action failed', 'error');
                    }
                } catch (error) {
                    Swal.fire('Error', 'Connection failed', 'error');
                }
            }
        };

        loadSwapOffers();
    });
    </script>
</body>
</html>
