<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swap Offers | EcoSwap</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary-green: rgb(34, 197, 94);
            --dark-green: rgb(21, 128, 61);
            --background: rgb(240, 253, 244);
            --text-dark: rgb(17, 24, 39);
            --white: rgb(255, 255, 255);
            --light-green: rgb(134, 239, 172);
            --border-gray: rgb(229, 231, 235);
            --sidebar-width: 250px;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 30px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .card {
            background: var(--white);
            padding: 25px;
            border-radius: 8px;
            border: 1px solid var(--border-gray);
            margin-bottom: 20px;
        }

        .page-header {
            color: var(--dark-green);
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-gray);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            margin-top: 0;
            color: var(--dark-green);
        }

        .tabs {
            display: flex;
            gap: 20px;
            border-bottom: 2px solid var(--border-gray);
            margin-bottom: 25px;
        }

        .tab {
            padding: 10px 15px;
            cursor: pointer;
            font-weight: 600;
            color: #6b7280;
            position: relative;
        }

        .tab.active {
            color: var(--primary-green);
        }

        .tab.active::after {
            content: "";
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary-green);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            border: 1px solid var(--border-gray);
            padding: 12px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background-color: var(--light-green);
            color: var(--dark-green);
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            color: var(--white);
            background-color: var(--primary-green);
            font-size: 14px;
        }

        .btn:hover {
            background-color: var(--dark-green);
        }

        .btn-danger {
            background-color: rgb(239, 68, 68);
        }

        .btn-danger:hover {
            background-color: rgb(185, 28, 28);
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
            text-transform: capitalize;
        }

        .status-pending { background: #fef3c7; color: #92400e; }
        .status-accepted { background: #dcfce7; color: #166534; }
        .status-rejected { background: #fee2e2; color: #991b1b; }

        .loading,
        .empty-state,
        .error-state {
            padding: 40px;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                padding: 15px;
            }
            table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>

<body>
    <main class="main-content">
        <section class="card">
            <div class="page-header">
                <h2 style="margin:0;">Swap Control Center</h2>
                <div id="pendingCount" style="font-size: 14px; color: #92400e; font-weight: 700;"></div>
            </div>

            <div class="tabs">
                <div id="incomingTab" class="tab active">Received Offers</div>
                <div id="outgoingTab" class="tab">Sent Requests</div>
            </div>

            <div id="loadingState" class="loading">
                <i class="ti ti-loader-2" style="font-size: 24px;"></i>
                <p>Loading swap offers...</p>
            </div>

            <div id="errorState" class="error-state hidden">
                <p style="color: #b91c1c;">Failed to load swap offers from the server.</p>
            </div>

            <div id="emptyState" class="empty-state hidden">
                <i class="ti ti-arrows-exchange" style="font-size: 48px; color: #ccc;"></i>
                <p>No swap offers found in this category.</p>
            </div>

            <div id="contentWrapper" class="hidden">
                <table>
                    <thead>
                        <tr>
                            <th>Item Details</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="proposalsList">
                        <!-- Dynamically filled by swaps.js -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/navbar.js"></script>
    <script src="../../assets/js/swaps.js"></script>
</body>

</html>
