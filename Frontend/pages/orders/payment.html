<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | EcoSwap</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .payment-container {
            max-width: 500px;
            margin: 100px auto;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .payment-header {
            margin-bottom: 30px;
        }
        .order-summary {
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: left;
        }
        .btn-pay {
            width: 100%;
            padding: 15px;
            background: #111;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-pay:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <div class="payment-container">
        <div class="payment-header">
            <h2>Secure Checkout</h2>
            <p>Complete your purchase for Order #<span id="displayOrderId">...</span></p>
        </div>

        <div class="order-summary">
            <p><strong>Total Amount:</strong> <span id="displayTotal">$0.00</span></p>
            <p><strong>Status:</strong> Pending Payment</p>
        </div>

        <button class="btn-pay" id="payButton">Pay Now</button>
        <p style="margin-top: 20px; font-size: 0.9rem; color: #666;">
            <i class="ti ti-lock"></i> Encrypted Secure Transaction
        </p>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script>
        const API_BASE = 'http://localhost:8000/Backend/index.php?route=/api';
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id');

        async function loadOrderDetails() {
            if (!orderId) {
                Swal.fire('Error', 'No Order ID provided', 'error');
                return;
            }
            document.getElementById('displayOrderId').innerText = orderId;

            try {
                const res = await fetch(`${API_BASE}/orders/cart&order_id=${orderId}`);
                const result = await res.json();
                if (result.data && result.data.order) {
                    document.getElementById('displayTotal').innerText = `$${result.data.order.total_amount}`;
                }
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('payButton').onclick = async () => {
            const btn = document.getElementById('payButton');
            btn.disabled = true;
            btn.innerText = 'Processing...';

            try {
                // In a real app, this would call a Stripe/PayPal API
                // Here we call our backend's payment processing endpoint
                const res = await fetch(`${API_BASE}/orders/payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_id: orderId, method: 'credit_card' })
                });
                const data = await res.json();

                if (data.success) {
                    Swal.fire({
                        title: 'Success!',
                        text: 'Payment successful. Your eco-contribution is confirmed!',
                        icon: 'success',
                        confirmButtonColor: '#111'
                    }).then(() => {
                        window.location.href = 'cart.html';
                    });
                } else {
                    Swal.fire('Error', data.error || 'Payment failed', 'error');
                    btn.disabled = false;
                    btn.innerText = 'Pay Now';
                }
            } catch (err) {
                Swal.fire('Error', 'Connection failed', 'error');
                btn.disabled = false;
                btn.innerText = 'Pay Now';
            }
        };

        loadOrderDetails();
    </script>
</body>
</html>
