<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart | EcoSwap</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="../../assets/css/main.css" />
  <link rel="stylesheet" href="../../assets/css/layout.css" />
  <link rel="stylesheet" href="../../assets/css/components.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root {
      --primary-green: rgb(34, 197, 94);
      --dark-green: rgb(21, 128, 61);
      --background: rgb(240, 253, 244);
      --text-dark: rgb(17, 24, 39);
      --white: rgb(255, 255, 255);
      --light-green: rgb(134, 239, 172);
      --border-gray: rgb(229, 231, 235);
      --sidebar-width: 250px;
      --sidebar-collapsed-width: 70px;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--background);
      color: var(--text-dark);
      margin: 0;
      padding: 0;
    }

    .main-content {
      margin-left: var(--sidebar-width);
      padding: 30px;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .card {
      background: var(--white);
      padding: 25px;
      border-radius: 8px;
      border: 1px solid var(--border-gray);
      margin-bottom: 20px;
    }

    .page-header {
      color: var(--dark-green);
      margin-top: 0;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border-gray);
      padding-bottom: 10px;
    }

    .section-title {
      margin-top: 0;
      color: var(--dark-green);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th,
    td {
      border: 1px solid var(--border-gray);
      padding: 12px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background-color: var(--light-green);
      color: var(--dark-green);
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      color: var(--white);
      background-color: var(--primary-green);
    }

    .btn:hover {
      background-color: var(--dark-green);
    }

    .btn-danger {
      background-color: rgb(239, 68, 68);
    }

    .btn-danger:hover {
      background-color: rgb(185, 28, 28);
    }

    .status-badge {
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: bold;
      display: inline-block;
      text-transform: capitalize;
    }

    .status-pending {
      background: #fef3c7;
      color: #92400e;
    }

    .status-paid,
    .status-completed,
    .status-delivered {
      background: #dcfce7;
      color: #166534;
    }

    .status-cancelled,
    .status-failed {
      background: #fee2e2;
      color: #991b1b;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 15px;
    }

    .info-box {
      background: #fafafa;
      border: 1px solid var(--border-gray);
      border-radius: 8px;
      padding: 15px;
    }

    .info-box h4 {
      margin-top: 0;
      margin-bottom: 10px;
      color: var(--dark-green);
    }

    .fee-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px dashed var(--border-gray);
    }

    .fee-row.total {
      border-top: 2px solid var(--dark-green);
      border-bottom: none;
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--dark-green);
    }

    .loading,
    .empty-state,
    .error-state {
      padding: 25px;
      text-align: center;
    }

    .error-state {
      color: #b91c1c;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 768px) {
      .main-content {
        margin-left: 0;
        padding: 15px;
      }

      table {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>

<body>
  <main class="main-content">
    <section class="card">
      <h2 class="page-header">Shopping Cart & Orders</h2>

      <div id="loadingState" class="loading">
        <i class="ti ti-loader-2"></i>
        <p>Loading cart data...</p>
      </div>

      <div id="errorState" class="error-state hidden">
        Failed to load cart data from the server.
      </div>

      <div id="emptyState" class="empty-state hidden">
        <i class="ti ti-shopping-cart-off" style="font-size: 48px"></i>
        <p>No orders or cart items found.</p>
      </div>

      <div id="contentWrapper" class="hidden">
        <!-- PENDING ORDERS LIST -->
        <div class="card">
          <h3 class="section-title">Your Pending Orders</h3>
          <p style="color: var(--muted); margin-bottom: 15px;">Review and pay for your pending purchases.</p>

          <table>
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Product Title</th>
                <th>Total Amount</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="pendingOrdersBody">
              <!-- Dynamically filled by orders.js -->
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/navbar.js"></script>
  <script src="../../assets/js/orders.js"></script>
</body>

</html>
