<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trust Score</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/Layout.css">
    <style>
        /* Trust Card */
.trust-card {
    background: white;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
    margin-bottom: 30px;
}

/* Circle Score */
.score-circle {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 10px solid #2ecc71;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 20px auto;
    font-size: 28px;
    font-weight: bold;
}

/* Label */
.score-label {
    font-size: 18px;
    color: #555;
}

/* Breakdown */
.breakdown {
    background: white;
    padding: 20px;
    border-radius: 12px;
}

.item {
    margin-bottom: 20px;
}

.item span {
    display: block;
    margin-bottom: 5px;
}

/* Progress Bars */
.bar {
    width: 100%;
    height: 10px;
    background: #eee;
    border-radius: 5px;
    overflow: hidden;
}

.bar div {
    height: 100%;
    background: #2ecc71;
    width: 0%;
    transition: 0.5s;
}
    </style>
</head>
<body>
    <!-- ── Main Container ── -->
    <div class="container">
        <main class="content">

            <!-- Score Card -->
            <section class="trust-card">
                <h2>Your Trust Score</h2>

                <div class="score-circle">
                    <span id="scoreValue">0%</span>
                </div>

                <p class="score-label" id="scoreLabel">Loading...</p>
            </section>

            <!-- Breakdown -->
            <section class="breakdown">
                <h3>Score Breakdown</h3>

                <div class="item">
                    <span>Successful Swaps</span>
                    <div class="bar"><div id="swapBar"></div></div>
                </div>

                <div class="item">
                    <span>User Reviews</span>
                    <div class="bar"><div id="reviewBar"></div></div>
                </div>

                <div class="item">
                    <span>Account Activity</span>
                    <div class="bar"><div id="activityBar"></div></div>
                </div>

            </section>

        </main>
    </div>

    <script>
        function loadTrustScore() {
    
    async function loadTrust() {
    const data = await request("/trust");

    document.getElementById("scoreValue").textContent = data.score + "%";
}

loadTrust();

    // Set score
    document.getElementById("scoreValue").textContent = data.score + "%";

    // Label logic
    let label = "Low";
    if (data.score > 80) label = "Excellent";
    else if (data.score > 60) label = "Good";
    else if (data.score > 40) label = " متوسط";

    document.getElementById("scoreLabel").textContent = label;

    // Bars
    document.getElementById("swapBar").style.width = data.swaps + "%";
    document.getElementById("reviewBar").style.width = data.reviews + "%";
    document.getElementById("activityBar").style.width = data.activity + "%";
}

loadTrustScore();

    </script>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('visible');
        }

        function togglePages(id, btn) {
            const pages = document.getElementById(id);
            pages.classList.toggle('open');
            btn.classList.toggle('open');
        }

        function logout() {
            window.location.href = '../auth/login.html';
        }
    </script>
    <!-- <script src="/assets/js/navbar.js"></script> -->
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/navbar.js"></script>
</body>
</html>
