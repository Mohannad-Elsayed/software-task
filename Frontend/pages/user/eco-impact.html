<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eco Impact</title>

    <link rel="stylesheet" href="../../assets/css/main.css" />
    <link rel="stylesheet" href="../../assets/css/components.css" />
    <link rel="stylesheet" href="../../assets/css/layout.css" />
    <style>
      /* Summary Cards */
      .eco-summary {
        display: flex;
        gap: 20px;
        margin-bottom: 30px;
      }

      .card {
        flex: 1;
        background: white;
        padding: 20px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }

      .card p {
        font-size: 24px;
        font-weight: bold;
        color: #2ecc71;
        margin-top: 10px;
      }

      /* Progress */
      .eco-progress {
        background: white;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 30px;
      }

      .progress-item {
        margin-bottom: 20px;
      }

      .bar {
        width: 100%;
        height: 10px;
        background: #eee;
        border-radius: 5px;
        overflow: hidden;
      }

      .bar div {
        height: 100%;
        background: #2ecc71;
        width: 0%;
        transition: 0.5s;
      }

      /* Achievements */
      .eco-achievements {
        background: white;
        padding: 20px;
        border-radius: 12px;
      }

      .badges {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
      }

      .badge {
        background: #eafaf1;
        color: #27ae60;
        padding: 10px 15px;
        border-radius: 20px;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <!-- ── Main Container ── -->
    <div class="container">
      <main class="content">
        <!-- Summary Cards -->
        <section class="eco-summary">
          <div class="card">
            <h3>Eco Points</h3>
            <p id="ecoPoints">0</p>
          </div>

          <div class="card">
            <h3>CO₂ Saved</h3>
            <p id="co2">0 kg</p>
          </div>

          <div class="card">
            <h3>Items Reused</h3>
            <p id="items">0</p>
          </div>
        </section>

        <!-- Progress Section -->
        <section class="eco-progress">
          <h3>Your Impact Progress</h3>

          <div class="progress-item">
            <span>Monthly Goal</span>
            <div class="bar"><div id="goalBar"></div></div>
          </div>

          <div class="progress-item">
            <span>Waste Reduction</span>
            <div class="bar"><div id="wasteBar"></div></div>
          </div>
        </section>

        <!-- Achievements -->
        <section class="eco-achievements">
          <h3>Achievements</h3>
          <div id="badges" class="badges"></div>
        </section>
      </main>
    </div>
    
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/navbar.js"></script>
    <script>
      async function loadEcoImpact() {
        const storedUser = JSON.parse(localStorage.getItem("user"));

        if (!storedUser) {
          window.location.href = "../../auth/login.html";

          return;
        }

        const userId = storedUser.user_id;

        const data = await request(`/api/user/profile&user_id=${userId}`);

        if (!data.success) {
          console.error(data.message);
          return;
        }

        const user = data.user;

        // Summary cards
        document.getElementById("ecoPoints").textContent = user.eco_points || 0;

        document.getElementById("co2").textContent =
          (user.co2_saved || 0) + " kg";

        // fake reused items calculation
        document.getElementById("items").textContent = Math.floor(
          (user.eco_points || 0) / 50,
        );

        // Progress bars
        const goal = Math.min((user.eco_points || 0) / 5, 100);

        const waste = Math.min((user.waste_reduced || 0) * 10, 100);

        document.getElementById("goalBar").style.width = goal + "%";

        document.getElementById("wasteBar").style.width = waste + "%";

        // Achievements
        const badges = document.getElementById("badges");

        badges.innerHTML = "";

        if (user.eco_points >= 100) {
          badges.innerHTML += `<div class="badge">Eco Starter</div>`;
        }

        if (user.eco_points >= 300) {
          badges.innerHTML += `<div class="badge">Green Warrior</div>`;
        }

        if (user.co2_saved >= 20) {
          badges.innerHTML += `<div class="badge">CO₂ Saver</div>`;
        }

        if (user.waste_reduced >= 5) {
          badges.innerHTML += `<div class="badge">Waste Reducer</div>`;
        }

        if (badges.innerHTML === "") {
          badges.innerHTML = `<div class="badge">No achievements yet</div>`;
        }
      }

      loadEcoImpact();
    </script>

    <script>
      function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("open");
        document.getElementById("overlay").classList.toggle("visible");
      }

      function togglePages(id, btn) {
        const pages = document.getElementById(id);
        pages.classList.toggle("open");
        btn.classList.toggle("open");
      }

      function logout() {
        window.location.href = "../auth/login.html";
      }
    </script>
    <!-- <script src="/assets/js/navbar.js"></script> -->
  </body>
</html>
