<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Details | EcoSwap</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center; justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            width: 90%; max-width: 500px;
            border-radius: 20px;
            padding: 25px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--muted); }

        .my-items-list {
            max-height: 300px; overflow-y: auto;
            display: grid; gap: 12px;
        }

        .selectable-item {
            display: flex; align-items: center; gap: 15px;
            padding: 10px; border: 2px solid #f1f5f9;
            border-radius: 12px; cursor: pointer; transition: 0.2s;
        }

        .selectable-item:hover { border-color: var(--primary); background: #f0fdfa; }

        .selectable-item.selected {
            border-color: var(--primary);
            background: #f0fdfa;
            box-shadow: 0 0 0 1px var(--primary);
        }

        .item-details h4 { font-size: 14px; margin: 0; }
        .item-details p { font-size: 12px; color: var(--muted); margin: 4px 0 0 0; }

        .modal-footer { margin-top: 25px; display: flex; gap: 10px; justify-content: flex-end; }

        :root {
            --primary: #09b1ba;
            --secondary: #4f46e5;
            --text: #1e293b;
            --muted: #64748b;
            --bg: #ffffff;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background: #f8fafc; color: var(--text); }

        .details-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .info-card { 
            background: white; 
            padding: 40px; 
            border-radius: 16px; 
            border: 1px solid #e5e7eb; 
        }

        .seller-info { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px; }

        .price-row { font-size: 28px; font-weight: 800; margin: 15px 0; }
        .item-title { font-size: 22px; margin-bottom: 10px; }

        .tags-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0; }
        .tag { background: #f1f5f9; padding: 6px 12px; border-radius: 20px; font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 5px; }

        .description { line-height: 1.6; color: #475569; font-size: 15px; margin-bottom: 25px; }

        .actions { display: flex; flex-direction: column; gap: 12px; }
        .btn { padding: 15px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-buy { background: var(--text); color: white; }
        .btn-swap { background: var(--primary); color: white; border: 2px solid var(--primary); }
        .btn-swap:hover { background: white; color: var(--primary); }

        .eco-benefit { background: #ecfdf5; color: #065f46; padding: 15px; border-radius: 10px; font-size: 13px; margin-top: 20px; border: 1px dashed #10b981; }


    </style>
</head>
<body>

<div class="details-container">
    <div class="info-card">
        <div class="seller-info">
            <div>
                <div style="font-weight: 700;" id="sellerName">Loading...</div>
                <div style="font-size: 12px; color: var(--muted);" id="sellerRole">Loading seller info...</div>
            </div>
        </div>

        <h1 class="item-title" id="listingTitle">Loading...</h1>
        <div class="price-row" id="listingPrice">—</div>

        <div class="tags-row">
            <div class="tag"><i class="ti ti-tag"></i> <span id="specCategory">—</span></div>
            <div class="tag"><i class="ti ti-sparkles"></i> <span id="specCondition">—</span></div>
        </div>

        <div class="description" id="listingDescription">Loading item details...</div>

        <div class="item-specifications" style="margin-top: 25px; border-top: 1px solid #f1f5f9; padding-top: 20px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 14px;">
                <div style="color: var(--muted);">Category</div>
                <div style="font-weight: 600;" id="specCategoryDetail">—</div>

                <div style="color: var(--muted);">Condition</div>
                <div style="font-weight: 600;" id="specConditionDetail">—</div>

                <div style="color: var(--muted);">Type</div>
                <div style="font-weight: 600;" id="specListingType">—</div>

                <div style="color: var(--muted);">Material</div>
                <div style="font-weight: 600;" id="specMaterial">—</div>

                <div style="color: var(--muted);">Status</div>
                <div style="font-weight: 600;" id="specStatus">—</div>
            </div>
        </div>

        <div class="actions" style="margin-top: 25px;">
            <button id="buyBtn" class="btn btn-buy">
                <i class="ti ti-shopping-cart"></i> Buy Now
            </button>
            <button id="swapBtn" class="btn btn-swap">
                <i class="ti ti-arrows-exchange"></i> Propose a Swap
            </button>
            <button id="reportBtn" class="btn" style="background:#fee2e2; color:#dc2626; border:1px solid #fecaca; margin-top:10px;">
                <i class="ti ti-report"></i> Report Listing
            </button>

        </div>

        <div class="eco-benefit">
            <strong>Eco Impact:</strong> By swapping this item, you help reduce textile waste and save resources!
        </div>
    </div>
</div>

<!-- Swap Proposal Modal -->
<div id="swapModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Select an Item to Swap</h3>
            <button class="close-btn" onclick="closeSwapModal()">&times;</button>
        </div>

        <div class="modal-body">
            <p style="font-size: 14px; color: var(--muted); margin-bottom: 20px;">
                Choose one of your listed items to offer in exchange.
            </p>
            <div class="my-items-list" id="myItemsList">
                <!-- Populated by listings.js -->
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn" style="background:#f1f5f9;color:#64748b;" onclick="closeSwapModal()">Cancel</button>
            <button class="btn btn-swap" id="confirmSwapBtn" disabled>Send Swap Proposal</button>
        </div>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/navbar.js"></script>
<script src="../../assets/js/listings.js"></script>
<script>
    // Populate spec detail spans that share data with the tag spans
    document.addEventListener("DOMContentLoaded", () => {
        const observer = new MutationObserver(() => {
            const cat = document.getElementById('specCategory')?.textContent;
            const cond = document.getElementById('specCondition')?.textContent;
            if (document.getElementById('specCategoryDetail')) document.getElementById('specCategoryDetail').textContent = cat || '—';
            if (document.getElementById('specConditionDetail')) document.getElementById('specConditionDetail').textContent = cond || '—';
        });
        ['specCategory', 'specCondition'].forEach(id => {
            const el = document.getElementById(id);
            if (el) observer.observe(el, { childList: true, characterData: true, subtree: true });
        });
    });
</script>
</body>
</html>
