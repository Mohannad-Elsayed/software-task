<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Listing | EcoSwap</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .app-container {
            display: flex;
            justify-content: center;
            padding: 20px;
            transition: margin-left 0.4s ease;
        }

        :root {
            --primary: #09b1ba;
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }

        .form-container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 { font-size: 24px; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }

        .photo-upload {
            border: 2px dashed #cbd5e1;
            background: #fdfdfd;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .photo-upload:hover {
            border-color: var(--primary);
            background: #f0fdfe;
            transform: translateY(-2px);
        }
        .photo-upload i { font-size: 40px; color: var(--primary); }

        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            color: #475569;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(9, 177, 186, 0.1); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .swap-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(24px); }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(9, 177, 186, 0.3);
        }
        .btn-submit:hover { opacity: 0.9; }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <div class="form-container">
        <h1 style="margin-top: 15px;"><i class="ti ti-package-export"></i> List New Item</h1>

        <div class="photo-upload" onclick="document.getElementById('fileInput').click()">
            <i class="ti ti-camera-plus"></i>
            <p style="margin-top: 10px;">Click to upload photos (Max 5)</p>
            <input type="file" id="fileInput" hidden multiple accept="image/*">
        </div>

        <form id="listingForm">
            <div class="form-group">
                <label for="listingTitle">Item Title *</label>
                <input type="text" id="listingTitle" name="title" placeholder="e.g., Vintage Oversized Denim Jacket" required>
            </div>

            <div class="form-group">
                <label for="listingDesc">Description</label>
                <textarea id="listingDesc" name="description" rows="4" placeholder="Tell us about the fit, material, and any flaws..."></textarea>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="listingCategory">Category</label>
                    <select id="listingCategory" name="category">
                        <option value="Clothing">Clothing</option>
                        <option value="Shoes">Shoes</option>
                        <option value="Accessories">Accessories</option>
                        <option value="Home">Home</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="listingCondition">Condition</label>
                    <select id="listingCondition" name="condition_status">
                        <option value="New with tags">New with tags</option>
                        <option value="Excellent">Excellent</option>
                        <option value="Good">Good</option>
                        <option value="Fair">Fair</option>
                    </select>
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="listingPrice">Price ($) *</label>
                    <input type="number" id="listingPrice" name="price" step="0.01" min="0" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label for="listingType">Listing Type</label>
                    <select id="listingType" name="listing_type">
                        <option value="sale">Sale</option>
                        <option value="swap">Swap</option>
                        <option value="upcycle">Upcycle</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-submit">List Item Now</button>
        </form>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/navbar.js"></script>
<script src="../../assets/js/listings.js"></script>
</body>
</html>
