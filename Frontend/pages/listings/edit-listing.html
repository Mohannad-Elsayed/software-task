<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Listing | EcoSwap</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #09b1ba;
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0 0 0 0;  }
        
        .form-container { max-width: 700px; margin: 0 auto; background: var(--white); padding: 30px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }

        h1 { font-size: 24px; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }

        /* Current Photos Preview */
        .current-photos {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .photo-thumb {
            width: 100px;
            height: 100px;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            border: 2px solid var(--border);
        }
        .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .remove-photo {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(239, 68, 68, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .swap-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        /* Switch UI */
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(24px); }

        .btn-update {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-cancel {
            width: 100%;
            padding: 12px;
            background: none;
            border: 1px solid var(--border);
            color: #64748b;
            border-radius: 10px;
            margin-top: 10px;
            cursor: pointer;
        }

        .upload-more {
          width: 100px;
          height: 100px;
          border: 2px dashed var(--primary);
          border-radius: 8px;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          color: var(--primary);
      }
    </style>
</head>
<body>
<div class="form-container">

    <h1><i class="ti ti-edit"></i> Edit Listing</h1>

    <label>Current Photos</label>
    <div class="current-photos" id="photoGallery">
        </div>
      
    <!-- داخل الـ form-container وقبل الـ form -->
    <label>Current Photos</label>
    <div class="current-photos" id="photoGallery">
        <!-- الصور بتنزل هنا بالـ JS -->
        <div class="upload-more" onclick="document.getElementById('newPhotoInput').click()">
            <i class="ti ti-plus"></i>
            <span>Add</span>
        </div>
    </div>
    <input type="file" id="newPhotoInput" hidden multiple>

    <form id="editForm">
        <div class="form-group">
            <label>Item Title</label>
            <input type="text" id="editTitle" required>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea id="editDesc" rows="4"></textarea>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Category</label>
                <select id="editCategory">
                    <option value="Clothing">Clothing</option>
                    <option value="Shoes">Shoes</option>
                    <option value="Accessories">Accessories</option>
                </select>
            </div>
            <div class="form-group">
                <label>Condition</label>
                <select id="editCondition">
                    <option value="New with tags">New with tags</option>
                    <option value="Excellent">Excellent</option>
                    <option value="Good">Good</option>
                </select>
            </div>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Price ($)</label>
                <input type="number" id="editPrice">
            </div>
            <div class="form-group">
                <label>Brand</label>
                <input type="text" id="editBrand">
            </div>
        </div>

        <div class="swap-option">
            <div>
                <strong>Available for Swap</strong>
                <p style="font-size: 12px; margin: 0;">Update swap status for this item.</p>
            </div>
            <label class="switch">
                <input type="checkbox" id="editSwapToggle">
                <span class="slider"></span>
            </label>
        </div>

        <button type="submit" class="btn-update">Save Changes</button>
        <button type="button" class="btn-cancel" onclick="window.history.back()">Cancel</button>
    </form>
</div>



<script src="../../assets/js/navbar.js"></script>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/listings.js"></script>

</body>
</html>
