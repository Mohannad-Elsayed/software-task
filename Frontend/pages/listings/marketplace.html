<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketplace | EcoSwap</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="../../assets/css/main.css" />
  <link rel="stylesheet" href="../../assets/css/layout.css" />
  <link rel="stylesheet" href="../../assets/css/components.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --primary: #09b1ba;
      --bg: #f8fafc;
      --text: #1f2937;
      --muted: #6b7280;
      --card-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    body {
      font-family: "Inter", sans-serif;
      background-color: var(--bg);
      margin: 0;
      color: var(--text);
    }

    .container {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .product-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 20px;
    }

    .product-card {
      border: 1px solid #eee;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }

    .product-info {
      padding: 16px;
    }

    .price-tag {
      font-size: 16px;
      letter-spacing: -0.5px;
    }

    .swap-badge {
      background: #eef2ff;
      color: #4f46e5;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 600;
      display: inline-block;
      margin-bottom: 5px;
    }

    .brand-name {
      font-size: 13px;
      color: var(--muted);
      margin: 4px 0;
    }

    .btn-swap {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-swap:hover {
      background: #078a92;
    }

    .fab {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--primary);
      color: white;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(9, 177, 186, 0.4);
      text-decoration: none;
      font-size: 24px;
    }
  </style>
</head>

<body>
  <div class="app-container" id="appContainer">
    <div class="container">
      <main class="product-grid" id="productGrid"></main>
    </div>

    <a href="../../pages/listings/create-listing.html" class="fab" title="Create Listing">
      <i class="ti ti-plus"></i>
    </a>
  </div>
  <footer>
    <p>&copy; 2026 Eco Marketplace. All rights reserved.</p>
  </footer>

  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/navbar.js"></script>
  <script src="../../assets/js/listings.js"></script>
</body>

</html>
