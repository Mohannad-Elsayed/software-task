<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Listing | EcoSwap</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .report-container {
            max-width: 600px;
            margin: 60px auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #f1f5f9;
        }
        .report-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .report-header i {
            font-size: 48px;
            color: #ef4444;
            margin-bottom: 15px;
        }
        .report-header h1 {
            font-size: 24px;
            color: var(--text);
            margin: 0;
        }
        .report-header p {
            color: var(--muted);
            margin-top: 10px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text);
        }
        .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            min-height: 150px;
            outline: none;
            transition: 0.2s;
        }
        .form-group textarea:focus {
            border-color: #ef4444;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
        }
        .btn-submit-report {
            width: 100%;
            padding: 15px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-submit-report:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
        }
        .listing-preview {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 4px solid #ef4444;
        }
        .listing-preview h4 {
            margin: 0;
            font-size: 16px;
        }
        .listing-preview p {
            margin: 5px 0 0;
            font-size: 13px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="report-container">
        <div class="report-header">
            <i class="ti ti-report"></i>
            <h1>Report Listing</h1>
            <p>Please provide a reason why you are reporting this listing.</p>
        </div>

        <div id="listingPreview" class="listing-preview">
            <h4 id="previewTitle">Loading listing...</h4>
            <p id="previewId"></p>
        </div>

        <form id="reportForm">
            <div class="form-group">
                <label for="reportReason">Reason for reporting</label>
                <textarea id="reportReason" placeholder="Describe the issue with this listing (e.g., prohibited item, scam, offensive content)..." required></textarea>
            </div>
            <button type="submit" class="btn-submit-report">Submit Report</button>
            <button type="button" onclick="window.history.back()" style="width:100%; margin-top:10px; background:none; border:1px solid #e2e8f0; padding:12px; border-radius:12px; color:#64748b; font-weight:600; cursor:pointer;">Cancel</button>
        </form>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/navbar.js"></script>
    <script>
        const API_BASE = 'http://localhost:8000/Backend/index.php?route=/api';
        const urlParams = new URLSearchParams(window.location.search);
        const listingId = urlParams.get('listing_id');

        document.addEventListener("DOMContentLoaded", async () => {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!user.user_id) {
                window.location.href = '../auth/login.html';
                return;
            }

            if (!listingId) {
                Swal.fire('Error', 'No listing specified.', 'error').then(() => window.history.back());
                return;
            }

            // Fetch listing info for preview
            try {
                const res = await fetch(`${API_BASE}/listings/${listingId}`);
                const result = await res.json();
                const listing = result.data || result;
                
                document.getElementById('previewTitle').textContent = listing.title;
                document.getElementById('previewId').textContent = `Listing ID: #${listingId}`;
            } catch (err) {
                console.error("Failed to load listing info:", err);
            }
        });

        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const reason = document.getElementById('reportReason').value;

            try {
                const res = await fetch(`${API_BASE}/reports`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        initiator_id: user.user_id,
                        listing_id: parseInt(listingId),
                        reason: reason
                    })
                });
                const data = await res.json();
                
                if (data.success) {
                    Swal.fire({
                        title: 'Success',
                        text: 'Report submitted successfully. Our team will review it.',
                        icon: 'success'
                    }).then(() => {
                        window.location.href = '../listings/marketplace.html';
                    });
                } else {
                    Swal.fire('Error', data.message || 'Failed to submit report', 'error');
                }
            } catch (err) {
                Swal.fire('Error', 'Connection failed', 'error');
            }
        });
    </script>
</body>
</html>
